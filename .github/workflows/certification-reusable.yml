---
# Ansible collection certification reusable workflow.
# Contains pinned versions of tests for certified
# collections on Automation Hub.
# This workflow is managed by Red Hat and can be
# called by certification.yml or another workflow.
name: "Run versioned collection certification checks"

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      ansible-core-version:
        description: >-
          ansible-core version to use (e.g. 2.16.0).
          The stable-X.Y branch is derived automatically for sanity tests.
        required: false
        default: '2.16.0'
        type: string
      python-versions:
        description: >-
          JSON list of Python versions to test against in the sanity matrix
          (e.g. '["3.7", "3.8", "3.9", "3.10", "3.11", "3.12"]').
        required: false
        default: '["3.6", "3.7", "3.8", "3.9", "3.10", "3.11", "3.12"]'
        type: string

jobs:
  # Derive stable-X.Y from the ansible-core-version input for use in the
  # sanity matrix, since GitHub Actions expressions cannot slice strings.
  compute-versions:
    name: "Compute versions"
    runs-on: ubuntu-latest
    outputs:
      stable-ansible: ${{ steps.compute.outputs.stable-ansible }}
    steps:
      - name: Derive stable-X.Y from ansible-core-version
        id: compute
        run: |
          version="${{ inputs.ansible-core-version }}"
          major_minor=$(echo "${version}" | cut -d. -f1,2)
          echo "stable-ansible=stable-${major_minor}" >> "${GITHUB_OUTPUT}"

  # Build the collection and run galaxy-importer on it
  # skipping ansible-lint as it runs as a separate job
  build-import:
    name: "Build & import collection"
    env:
      CHECK_REQUIRED_TAGS: "True"
      RUN_ANSIBLE_LINT: "False"
      CORE_VER: ${{ inputs.ansible-core-version }}
      GALAXY_IMPORTER_VER: "0.4.31"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: pip install ansible-core==${{ env.CORE_VER }}

      - name: Install galaxy-importer
        shell: bash
        run: pip install galaxy-importer==${{ env.GALAXY_IMPORTER_VER }}

      - name: Update galaxy-importer.cfg
        shell: bash
        run: |
          cat > /tmp/galaxy-importer.cfg << EOF
          [galaxy-importer]
          CHECK_REQUIRED_TAGS=${{ env.CHECK_REQUIRED_TAGS }}
          RUN_ANSIBLE_LINT=${{ env.RUN_ANSIBLE_LINT }}
          EOF

          echo "GALAXY_IMPORTER_CONFIG=/tmp/galaxy-importer.cfg" >> "${GITHUB_ENV}"

      - name: Build the collection tarball and run galaxy importer on it
        shell: bash
        run: python -m galaxy_importer.main --git-clone-path . --output-path /tmp

  # Run ansible-lint with profile "production"
  # and skipping sanity checks as they run as a separate job
  lint:
    name: "Lint production"
    runs-on: ubuntu-latest
    env:
      CORE_VER: ${{ inputs.ansible-core-version }}
      LINT_VER: "24.12.2"

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: pip install ansible-core==${{ env.CORE_VER }}

      - name: Install ansible-lint
        run: pip install ansible-lint==${{ env.LINT_VER }}

      - name: Run ansible-lint
        run: ansible-lint --profile=production -x sanity

  # Run sanity checks against the collection
  sanity:
    needs: compute-versions
    name: Sanity (Ⓐ${{ needs.compute-versions.outputs.stable-ansible }}, Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ${{ fromJSON(inputs.python-versions) }}

    steps:
      # Run sanity tests inside a Docker container.
      # The docker container has all the pinned dependencies that are
      # required and all Python versions Ansible supports.
      - name: Perform sanity testing
        # See the documentation for the following GitHub action on
        # https://github.com/ansible-community/ansible-test-gh-action/blob/main/README.md
        uses: ansible-community/ansible-test-gh-action@d3a8ec7a59694e25e210fcd44738910149537f0e  # v1.17.0
        with:
          ansible-core-version: ${{ needs.compute-versions.outputs.stable-ansible }}
          testing-type: sanity
          target-python-version: ${{ matrix.python }}
          # Uncomment to configure a codecov token.
          # Check here whether a token is required: https://docs.codecov.com/docs/codecov-tokens
          # Collections in the github.com/ansible-collections/ namespace usually do not need a token.
          # codecov-token: ${{ secrets.CODECOV_TOKEN }}
          # OPTIONAL If your sanity tests require code
          # from other collections, install them like this
          # test-deps: >-
          #   ansible.netcommon
          #   ansible.utils
          # OPTIONAL If set to true, will test only against changed files,
          # which should improve CI performance. See limitations on
          # https://github.com/ansible-community/ansible-test-gh-action#pull-request-change-detection
          pull-request-change-detection: false
